name: virtual_try_on
description: A new Flutter project for Virtual Try-On.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.5
  dio: ^5.3.3
  image_picker: ^1.0.4
  image_cropper: ^7.0.0
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  cached_network_image: ^3.3.0
  intl: ^0.18.1
  sqflite: ^2.3.0
  gal: ^2.3.0
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.3
  google_sign_in: ^6.1.6
  webview_flutter: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0B1020"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
